<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 90">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#15803d"/>
      <stop offset="30%"  stop-color="#16a34a"/>
      <stop offset="65%"  stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
  </defs>

  <!-- Background matching site bg-gray-950 -->
  <rect width="400" height="90" fill="#030712"/>

  <!-- "Net Profit" bold text -->
  <text
    x="8" y="72"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-weight="900"
    font-size="68"
    fill="url(#g)"
  >Net Profit</text>

  <!-- Upward chart arrow overlaid on the N -->
  <polyline points="14,66 25,43 36,55 53,14"
    stroke="rgba(255,255,255,0.88)" stroke-width="3.8"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="43,10 53,14 50,25"
    stroke="rgba(255,255,255,0.88)" stroke-width="3.8"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Small curved chart arrow on the "fi" in Profit -->
  <path d="M 285,62 C 289,48 293,34 300,20"
    stroke="rgba(255,255,255,0.88)" stroke-width="2.8"
    stroke-linecap="round" fill="none"/>
  <polyline points="291,16 300,20 297,30"
    stroke="rgba(255,255,255,0.88)" stroke-width="2.8"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
